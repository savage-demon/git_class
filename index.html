---
layout: default
---
<div class="max-w-6xl mx-auto px-6 py-16 text-center">
    <h1 class="text-5xl font-black text-slate-900 mb-6">Блог нашей команды</h1>
    <p class="text-xl text-slate-600 mb-12">Участники, которые успешно освоили Git</p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 text-left">
        {% for student in site.students %}
        <a href="{{ student.url | relative_url }}" class="group bg-white p-8 rounded-3xl shadow-sm border border-slate-200 hover:shadow-xl transition-all">
            <div class="w-14 h-14 {{ student.color | default: 'bg-indigo-500' }} rounded-2xl mb-6 flex items-center justify-center text-white shadow-lg font-bold">
                {{ student.name | slice: 0, 1 | upcase }}
            </div>
            <h3 class="text-xl font-bold mb-2 group-hover:text-indigo-600">{{ student.name }}</h3>
            <p class="text-slate-500 text-sm leading-relaxed">{{ student.bio }}</p>
            <div class="mt-6 text-indigo-600 font-bold text-sm">Профиль &rarr;</div>
        </a>
        {% endfor %}
    </div>
</div>
